name: Deploy theme to Shopify

on:
  push:
    branches: [main]
    paths:
      - 'assets/**'
      - 'blocks/**'
      - 'config/**'
      - 'layout/**'
      - 'locales/**'
      - 'sections/**'
      - 'snippets/**'
      - 'templates/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install Shopify CLI
        run: npm install -g @shopify/cli@latest
      - name: Sanitize Shopify secrets
        env:
          RAW_STORE: ${{ secrets.SHOPIFY_STORE }}
          RAW_TOKEN: ${{ secrets.SHOPIFY_CLI_THEME_TOKEN }}
        run: |
          CLEAN_STORE=$(printf '%s' "$RAW_STORE" | tr -d '[:space:]' | sed -e 's#^https\?://##' -e 's#/$##')
          CLEAN_TOKEN=$(printf '%s' "$RAW_TOKEN" | tr -d '[:space:]')
          echo "::add-mask::$CLEAN_STORE"
          echo "::add-mask::$CLEAN_TOKEN"
          echo "CLEAN_STORE=$CLEAN_STORE" >> "$GITHUB_ENV"
          echo "CLEAN_TOKEN=$CLEAN_TOKEN" >> "$GITHUB_ENV"
          echo "DEBUG store length=${#CLEAN_STORE} first=${CLEAN_STORE:0:3} last=${CLEAN_STORE: -3}"
      - name: Push theme
        env:
          SHOPIFY_CLI_THEME_TOKEN: ${{ env.CLEAN_TOKEN }}
          SHOPIFY_FLAG_STORE: ${{ env.CLEAN_STORE }}
        run: shopify theme push --theme "${{ vars.THEME_ID }}" --store "${{ env.CLEAN_STORE }}" --allow-live --json
